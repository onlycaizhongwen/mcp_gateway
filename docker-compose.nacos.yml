services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mcp-gateway-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8848/nacos/v1/console/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s
