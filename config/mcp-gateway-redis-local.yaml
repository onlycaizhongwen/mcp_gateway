discovery:
  mode: mock

mcp_client:
  mode: mock
  timeout_seconds: 10

admin:
  allowed_app_ids:
    - internal-ai-agent

state_backend:
  mode: redis
  redis:
    url: redis://127.0.0.1:6379/0
    key_prefix: mcp-gateway-local
    socket_timeout_seconds: 1

circuit_breaker:
  enabled: true
  failure_threshold: 3
  recovery_seconds: 30

health_check:
  enabled: false
  timeout_seconds: 1

catalog_refresh:
  enabled: false
  interval_seconds: 30

nacos:
  enabled: false
  endpoint: http://127.0.0.1:8848
  namespace: dev
  group: MCP_SERVER_GROUP
  service_names:
    - mcp-server-knowledge
  username:
  password:
  timeout_seconds: 3

permissions:
  apps:
    - app_id: internal-ai-agent
      credential_ref: local://internal-ai-agent
      tenants:
        - tenant-a
      allowed_tools:
        - knowledge.search
      rate_limit:
        qps: 1
        burst: 1
