discovery:
  mode: mock

mcp_client:
  mode: mock
  timeout_seconds: 10

admin:
  allowed_app_ids:
    - internal-ai-agent

circuit_breaker:
  enabled: true
  failure_threshold: 3
  recovery_seconds: 30

health_check:
  enabled: false
  timeout_seconds: 1

catalog_refresh:
  enabled: false
  interval_seconds: 30

nacos:
  enabled: false
  endpoint: http://127.0.0.1:8848
  namespace: dev
  group: MCP_SERVER_GROUP
  service_names:
    - mcp-server-knowledge
    - mcp-server-approval
    - mcp-server-document
  username:
  password:
  timeout_seconds: 3

permissions:
  apps:
    - app_id: internal-ai-agent
      credential_ref: kms://mcp/apps/internal-ai-agent
      tenants:
        - tenant-a
        - tenant-b
      allowed_tools:
        - knowledge.search
        - approval.create_task
        - document.generate
      rate_limit:
        qps: 20
        burst: 50
    - app_id: demo-app
      credential_ref: local://demo
      tenants:
        - tenant-a
      allowed_tools:
        - knowledge.search
      rate_limit:
        qps: 5
        burst: 10
