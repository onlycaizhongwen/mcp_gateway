<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0369a1"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .canvas{fill:#ffffff;stroke:#d8e1ee;stroke-width:1.2}
      .zone{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5;rx:16}
      .node{fill:#ffffff;stroke:#334155;stroke-width:1.5;rx:12}
      .gw{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:12}
      .reg{fill:#fff7d6;stroke:#d97706;stroke-width:2;rx:12}
      .tool{fill:#dcfce7;stroke:#16a34a;stroke-width:1.8;rx:12}
      .title{font:700 22px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}
      .subtitle{font:700 17px Arial,"Microsoft YaHei",sans-serif;fill:#1e293b}
      .text{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .small{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#475569}
      .call{stroke:#0369a1;stroke-width:2.4;fill:none;marker-end:url(#arrow-blue)}
      .sub{stroke:#475569;stroke-width:2.1;fill:none;marker-end:url(#arrow-slate)}
      .regline{stroke:#b45309;stroke-width:2.2;fill:none;marker-end:url(#arrow-amber)}
      .label{fill:#ffffff;stroke:#d8e1ee;stroke-width:1;rx:7}
      .legend{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
    </style>
  </defs>

  <rect x="24" y="24" width="1232" height="672" class="canvas"/>
  <text x="56" y="66" class="title">MCP 网关部署图</text>
  <text x="56" y="94" class="text">部署图表达运行单元分布：上游应用访问 Gateway 集群，Gateway 订阅 Nacos 并调用工具服务区，工具服务区向 Nacos 注册。</text>

  <rect x="64" y="142" width="230" height="420" class="zone"/>
  <text x="112" y="182" class="subtitle">上游应用区</text>
  <rect x="108" y="318" width="142" height="70" class="node"/>
  <text x="151" y="358" class="text">AI 应用</text>

  <rect x="358" y="142" width="260" height="420" class="zone"/>
  <text x="430" y="182" class="subtitle">Gateway 集群</text>
  <rect x="406" y="254" width="166" height="66" class="gw"/>
  <text x="446" y="292" class="text">mcp-gateway-1</text>
  <rect x="406" y="386" width="166" height="66" class="gw"/>
  <text x="446" y="424" class="text">mcp-gateway-2</text>

  <rect x="686" y="142" width="220" height="420" class="zone"/>
  <text x="756" y="182" class="subtitle">注册中心</text>
  <rect x="734" y="324" width="124" height="82" class="reg"/>
  <text x="768" y="360" class="text">Nacos</text>
  <text x="762" y="384" class="small">注册发现</text>

  <rect x="970" y="142" width="230" height="420" class="zone"/>
  <text x="1032" y="182" class="subtitle">工具服务区</text>
  <rect x="1010" y="230" width="150" height="48" class="tool"/>
  <text x="1042" y="259" class="small">knowledge-1</text>
  <rect x="1010" y="308" width="150" height="48" class="tool"/>
  <text x="1042" y="337" class="small">knowledge-2</text>
  <rect x="1010" y="386" width="150" height="48" class="tool"/>
  <text x="1050" y="415" class="small">approval-1</text>
  <rect x="1010" y="464" width="150" height="48" class="tool"/>
  <text x="1052" y="493" class="small">document-1</text>

  <path d="M250 353 H406" class="call"/>
  <path d="M250 353 H318 V419 H406" class="call"/>
  <rect x="284" y="324" width="92" height="26" class="label"/>
  <text x="296" y="342" class="small">访问网关</text>

  <path d="M572 287 H650 V344 H734" class="sub"/>
  <path d="M572 419 H650 V386 H734" class="sub"/>
  <rect x="620" y="312" width="92" height="26" class="label"/>
  <text x="632" y="330" class="small">订阅服务</text>

  <path d="M572 287 H930 V352 H970" class="call"/>
  <path d="M572 419 H930 V352 H970" class="call"/>
  <rect x="746" y="262" width="92" height="26" class="label"/>
  <text x="758" y="280" class="small">MCP 调用</text>

  <path d="M1085 230 V120 H796 V324" class="regline"/>
  <rect x="944" y="108" width="116" height="26" class="label"/>
  <text x="956" y="126" class="small">注册 / 心跳</text>

  <rect x="64" y="612" width="16" height="4" fill="#0369a1"/>
  <text x="88" y="620" class="legend">蓝色：业务请求和 MCP 调用主链路</text>
  <rect x="314" y="612" width="16" height="4" fill="#475569"/>
  <text x="338" y="620" class="legend">灰色：Gateway 集群订阅 Nacos 服务发现</text>
  <rect x="634" y="612" width="16" height="4" fill="#b45309"/>
  <text x="658" y="620" class="legend">橙色：工具服务区向 Nacos 注册实例和心跳</text>
</svg>
