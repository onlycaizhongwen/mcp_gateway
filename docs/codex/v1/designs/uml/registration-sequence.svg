<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .head{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5;rx:8}
      .line{stroke:#94a3b8;stroke-width:1.2;stroke-dasharray:5 5}
      .arrow{stroke:#334155;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .title{font:700 18px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}
      .text{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .small{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#475569}
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="520" fill="#fff" stroke="#cbd5e1"/>
  <text x="40" y="55" class="title">MCP Server 注册发现时序图</text>
  <rect x="80" y="85" width="160" height="45" class="head"/><text x="118" y="113" class="text">MCP Server</text>
  <rect x="340" y="85" width="160" height="45" class="head"/><text x="393" y="113" class="text">Nacos</text>
  <rect x="600" y="85" width="190" height="45" class="head"/><text x="633" y="113" class="text">Gateway Discovery</text>
  <rect x="880" y="85" width="160" height="45" class="head"/><text x="918" y="113" class="text">Tool Catalog</text>

  <line x1="160" y1="130" x2="160" y2="510" class="line"/>
  <line x1="420" y1="130" x2="420" y2="510" class="line"/>
  <line x1="695" y1="130" x2="695" y2="510" class="line"/>
  <line x1="960" y1="130" x2="960" y2="510" class="line"/>

  <path d="M160 165 C110 165 110 205 160 205" class="arrow"/><text x="178" y="188" class="small">加载 Tool 定义与 Schema 引用</text>
  <path d="M160 230 C110 230 110 270 160 270" class="arrow"/><text x="178" y="252" class="small">构建 Nacos metadata</text>
  <path d="M160 300 H420" class="arrow"/><text x="230" y="292" class="small">注册实例(host, port, metadata)</text>
  <path d="M160 345 H420" class="arrow"/><text x="245" y="337" class="small">心跳 / 健康上报</text>
  <path d="M695 390 H420" class="arrow"/><text x="480" y="382" class="small">订阅 mcp-server-* 服务</text>
  <path d="M420 430 H695" class="arrow"/><text x="475" y="422" class="small">推送实例新增或变更事件</text>
  <path d="M695 465 C645 465 645 505 695 505" class="arrow"/><text x="713" y="488" class="small">校验 metadata 与协议版本</text>
  <path d="M695 525 H960" class="arrow"/><text x="750" y="517" class="small">刷新实例与工具描述</text>
</svg>
