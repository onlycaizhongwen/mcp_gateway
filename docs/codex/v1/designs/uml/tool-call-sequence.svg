<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="620" viewBox="0 0 1260 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .head{fill:#e0f2fe;stroke:#0369a1;stroke-width:1.5;rx:8}
      .line{stroke:#94a3b8;stroke-width:1.2;stroke-dasharray:5 5}
      .arrow{stroke:#334155;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .ret{stroke:#64748b;stroke-width:1.4;fill:none;stroke-dasharray:4 4;marker-end:url(#arrow)}
      .title{font:700 18px Arial,"Microsoft YaHei",sans-serif;fill:#0f172a}
      .text{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
      .small{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#475569}
    </style>
  </defs>
  <rect x="20" y="20" width="1220" height="580" fill="#fff" stroke="#cbd5e1"/>
  <text x="40" y="55" class="title">工具调用时序图</text>
  <rect x="50" y="85" width="135" height="45" class="head"/><text x="92" y="113" class="text">AI 应用</text>
  <rect x="230" y="85" width="145" height="45" class="head"/><text x="260" y="113" class="text">MCP Gateway</text>
  <rect x="420" y="85" width="130" height="45" class="head"/><text x="448" y="113" class="text">Auth/Policy</text>
  <rect x="595" y="85" width="135" height="45" class="head"/><text x="625" y="113" class="text">Tool Catalog</text>
  <rect x="775" y="85" width="155" height="45" class="head"/><text x="800" y="113" class="text">Router/Scheduler</text>
  <rect x="975" y="85" width="130" height="45" class="head"/><text x="1005" y="113" class="text">MCP Server</text>
  <rect x="1135" y="85" width="90" height="45" class="head"/><text x="1160" y="113" class="text">Audit</text>

  <line x1="117" y1="130" x2="117" y2="560" class="line"/>
  <line x1="302" y1="130" x2="302" y2="560" class="line"/>
  <line x1="485" y1="130" x2="485" y2="560" class="line"/>
  <line x1="662" y1="130" x2="662" y2="560" class="line"/>
  <line x1="852" y1="130" x2="852" y2="560" class="line"/>
  <line x1="1040" y1="130" x2="1040" y2="560" class="line"/>
  <line x1="1180" y1="130" x2="1180" y2="560" class="line"/>

  <path d="M117 165 H302" class="arrow"/><text x="145" y="157" class="small">tools/call(toolName,args)</text>
  <path d="M302 215 H485" class="arrow"/><text x="320" y="207" class="small">校验身份、租户、权限</text>
  <path d="M485 250 H302" class="ret"/><text x="360" y="242" class="small">通过 / 拒绝</text>
  <path d="M302 295 H662" class="arrow"/><text x="405" y="287" class="small">查询候选 ToolDescriptor</text>
  <path d="M662 330 H302" class="ret"/><text x="425" y="322" class="small">可用工具与实例列表</text>
  <path d="M302 375 H852" class="arrow"/><text x="505" y="367" class="small">选择目标实例</text>
  <path d="M852 410 H302" class="ret"/><text x="535" y="402" class="small">ToolRoute</text>
  <path d="M302 455 H1040" class="arrow"/><text x="610" y="447" class="small">MCP tools/call</text>
  <path d="M1040 495 H302" class="ret"/><text x="610" y="487" class="small">MCP result / error</text>
  <path d="M302 530 H1180" class="arrow"/><text x="650" y="522" class="small">记录结果、耗时、错误码</text>
  <path d="M302 565 H117" class="ret"/><text x="165" y="557" class="small">统一响应</text>
</svg>
